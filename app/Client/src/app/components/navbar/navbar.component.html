<mat-toolbar color="primary" class="relative">
  <span class="flex space-x-2">
    <a mat-button *ngFor="let button of buttons" [routerLink]="button.link"
       routerLinkActive="selected">
      <span class="flex justify-center items-center gap-2">
        <mat-icon>{{button.icon}}</mat-icon>
        <p>{{ button.text }}</p>
      </span>
    </a>
  </span>

  <span class="grow"></span>

  <button mat-button [matMenuTriggerFor]="menu" (click)="$event.stopPropagation()">
    <div class="flex items-center justify-center">
      <img [src]="avatarUrl" alt="Avatar image" height="32" width="32">
      <mat-icon>keyboard_arrow_down</mat-icon>
    </div>

  </button>

  <mat-menu #menu="matMenu" class="w-48">
    <div class="p-4 flex flex-col gap-2">
      <p class="font-medium">{{member?.firstName}} {{member?.lastName}}</p>
      <p>{{member?.roleName}}</p>
    </div>
    <mat-divider></mat-divider>
    <a mat-menu-item href="/members/{{member?.id}}">View Profile</a>
    <a mat-menu-item href="/members/{{member?.id}}/edit">Edit Profile</a>
    <mat-divider></mat-divider>
    <a mat-menu-item>Logout</a>
  </mat-menu>
</mat-toolbar>
