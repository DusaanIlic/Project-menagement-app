<div class="relative p-4 w-full max-w-4xl max-h-full">
    <div class="flex items-center justify-between mb-3">
        <div class="flex items-center justify-start">
            <p class="mr-2"><strong>{{ member.firstName }} {{ member.lastName }}</strong></p> 
            <button [routerLink]="['/members', member.id]" class="text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center dark:hover:bg-gray-600 dark:hover:text-white" data-modal-hide="default-modal" (click)="closeDialog()">
                <mat-icon aria-hidden="false" aria-label="Profile" fontIcon="account_circle"></mat-icon>
            </button> 
        </div>    
        <button type="button" class="text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center dark:hover:bg-gray-600 dark:hover:text-white" data-modal-hide="default-modal" (click)="closeDialog()">
            <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
            </svg>
            <span class="sr-only">Close modal</span>
        </button>
    </div>       
    <div class="flex items-center justify-center mb-3">
        <img ngSrc="http://localhost:8000/api/Member/{{member.id}}/Avatar" alt="Avatar" class="border-solid border-black border-2 "
        height="100" width="150">
    </div>
    
    <div class="flex flex-row items-center justify-between">
        <p class="mr-2"><strong>Email:</strong> {{ member.email }}</p>
         
    </div>
</div>
