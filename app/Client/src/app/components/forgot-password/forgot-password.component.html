<div class="min-h-screen flex flex-nowrap">
  <div class="basis-1/2 hidden xl:flex flex-col justify-center items-center bg-gradient-to-bl from-[#a9edf6] to-[#6dafb8] select-none">
    <img ngSrc="/assets/logo.png" alt="Logic Tenacity Logo" height="394" width="633">
  </div>

  <div class="grow flex flex-col justify-center items-center gap-10">
    <div class="flex flex-col min-w-80 items-center justify-between gap-10">
      <form class="flex flex-col gap-2 w-full">
        <label class="text-xl select-none" for="password1">New Password</label>
        <input class="min-h-9 text-xl border-2 rounded-xl p-1.5"
               type="password" name="password1" id="password1" required>
        <label class="text-xl select-none" for="password2">Re-type Password</label>
        <input class="min-h-9 text-xl border-2 rounded-xl p-1.5"
               type="password" name="password2" id="password2" required>
      </form>

      <button class="w-full bg-accent-blue text-white rounded-2xl min-h-12 font-bold hover:bg-[#0B2043] select-none"
              type="button">Reset password</button>
    </div>
  </div>

  <ng-toast></ng-toast>
</div>
