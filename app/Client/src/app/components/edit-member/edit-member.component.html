<div class=" w-8/12 m-auto">
    <div class="flex flex-col w-full xl:flex-row p-2 justify-between">
        <div class="flex flex-col my-2">
            <h1 class="text-xl font-bold">Public avatar</h1>
            <p>You can change or remove your avatar here.</p>
        </div>

        <div class="flex rounded-full bg-[url('assets/avatar.png')] border-solid border-black border-2  size-40 my-2" (click)="openAvatar()">

        </div>

        <div class="flex flex-col my-2 justify-between">
            <h2 class="text-lg font-bold">Upload new avatar</h2>
            <input type="file" class="flex w-auto file:rounded-md file:border-0  file:bg-[#0E2954] file:text-white"/>
            <p class="flex">The maximum file size allowed is 200KB.</p>
            <hr class="border-1 border-black w-80">
            <button type="button" class="flex focus:outline-none w-40 text-white bg-red-700 xl:hover:bg-red-800 focus:ring-4 focus:ring-red-300 font-medium rounded-md text-sm px-5 py-2.5 me-2 mb-2 dark:bg-red-600 mt-2">Remove current avatar</button>
        </div>
    </div>
</div>
