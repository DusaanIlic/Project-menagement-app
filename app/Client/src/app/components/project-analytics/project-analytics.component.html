<div class="flex">
  <mat-card>
    <div class="flex flex-col justify-between m-2">
      <h1 class="text-xl flex">Project completion rate</h1>
      <ngx-charts-gauge class="flex"
      [results]="dataForChart"
      [angleSpan]="360" [startAngle]="270"
      [view]="[400,400]"
      [legend]="false"
      [showText]="true"
      [smallSegments]="2"
      [units]="'%'"
      [customColors]="customColors">

      </ngx-charts-gauge>

    </div>
  </mat-card>

  <mat-card class="ml-2">
    <div class="flex flex-col justify-between m-2">
      <h1 class="text-xl flex">Incomplete tasks by category</h1>
      <ngx-charts-bar-vertical
      [results]="namesForBarChart"
      [showXAxisLabel]="true"
      [legend]="true"
      [legendPosition]="below">

      </ngx-charts-bar-vertical>

    </div>
  </mat-card>

</div>
