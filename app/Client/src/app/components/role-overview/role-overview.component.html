<div class="h-full flex flex-col select-none">
  <mat-toolbar class="flex justify-between">
    <h1>Roles Overview</h1>

    <button mat-button type="button" class="flex justify-center items-center" (click)="closeDialog()">
      <div class="flex items-center justify-center">
        <mat-icon>close</mat-icon>
      </div>
    </button>
  </mat-toolbar>

  <mat-sidenav-container class="grow">
    <mat-sidenav #sidenav mode="side" opened="true">
      <mat-nav-list>
        <mat-list-item *ngFor="let role of roles" (click)="selectRole(role)">
          <div class="flex items-center justify-content-between">
            <mat-icon *ngIf="role.isDefault" class="scale-75">lock</mat-icon>
            <p>{{role.name}}</p>
          </div>
        </mat-list-item>
      </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content>
      <div *ngIf="!selectedRole" class="flex justify-center items-center h-full">
        <p>Select a role to display settings.</p>
      </div>

      <div *ngIf="selectedRole">
        <mat-tab-group>
          <mat-tab label="Settings">
            <div class="flex p-2">
                <mat-card class="grow">
                  <mat-card-header>
                    <mat-card-title>Display information</mat-card-title>
                  </mat-card-header>
                  <mat-card-content>
                    <mat-form-field>
                      <mat-label>Role Name</mat-label>
                      <input matInput>
                    </mat-form-field>
                  </mat-card-content>
                </mat-card>
            </div>
          </mat-tab>
          <mat-tab label="Members">
            <div>

            </div>
          </mat-tab>
        </mat-tab-group>
      </div>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
