<div class="h-full flex flex-col select-none">
  <mat-toolbar>
    <div class="flex w-full gap-2 items-center min-h-16">
      <h1 *ngIf="selectedRole">Editing {{selectedRole.name}} <span *ngIf="selectedRole.isFallback">(Fallback Role)</span></h1>
      <h1 *ngIf="!selectedRole">Role Overview</h1>

      <span class="grow"></span>

      <button mat-raised-button color="primary" type="button" (click)="addRole()">
        <div class="flex items-center justify-center">
          <p class="flex items-center justify-center">Add New Role</p>
        </div>
      </button>

      <button mat-stroked-button type="button" class="flex justify-center items-center" (click)="closeDialog()">
        <div class="flex items-center justify-center">
          <mat-icon>close</mat-icon>
        </div>
      </button>
    </div>
  </mat-toolbar>

  <mat-sidenav-container class="grow" autosize>
    <mat-sidenav mode="side" opened="true">
      <mat-nav-list>
        <mat-list-item *ngFor="let role of roles" (click)="selectRole(role)" [disabled]="role==selectedRole">
          <div class="flex items-center justify-between gap-2">
            <p>{{role.name}}</p>
            <div class="flex items-center justify-center">
              <mat-icon *ngIf="role.isFallback" class="scale-75">api</mat-icon>
              <mat-icon *ngIf="role.isDefault" class="scale-75">lock</mat-icon>
            </div>
          </div>
        </mat-list-item>
      </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content>
      <div *ngIf="!selectedRole" class="flex justify-center items-center h-full">
        <p class="flex items-center justify-center">Select a role to display settings.</p>
      </div>

      <div *ngIf="selectedRole">
        <mat-tab-group>
          <mat-tab label="Settings">
            <div class="flex flex-col p-2 gap-2">
                <mat-card class="grow">
                  <mat-card-header>
                    <mat-card-title>General</mat-card-title>
                  </mat-card-header>
                  <mat-card-content>
                    <div class="pt-2" [formGroup]="roleForm">
                      <mat-form-field>
                        <mat-label>Role Name</mat-label>
                        <input matInput formControlName="name">
                        <mat-error *ngIf="roleForm?.get('name')?.required">
                          Role name is required
                        </mat-error>
                        <mat-error *ngIf="roleForm.get('name')?.hasError('nameExists')">
                          Role name must be unique
                        </mat-error>
                      </mat-form-field>
                      <div class="flex flex-row-reverse gap-2">
                        <button mat-raised-button color="primary" [disabled]="selectedRole.isDefault || !roleForm.valid || roleForm.pristine" class="mt-4" (click)="saveGeneral()">Update</button>
                        <button mat-raised-button color="warn" [disabled]="selectedRole.isDefault" class="mt-4">Delete</button>
                      </div>
                    </div>
                  </mat-card-content>
                </mat-card>

                <mat-card class="grow">
                  <mat-card-header>
                    <mat-card-title>Permissions</mat-card-title>
                  </mat-card-header>
                  <mat-card-content>
                    <div *ngFor="let permission of permissions">
                      <mat-checkbox
                        [checked]="isPermissionAssigned(selectedRole.id, permission.permissionId)"
                        [disabled]="selectedRole.isDefault"
                        (change)="togglePermission($event.checked, selectedRole.id, permission.permissionId)">
                        {{ permission.permissionName }}
                      </mat-checkbox>
                    </div>
                  </mat-card-content>
                </mat-card>
            </div>
          </mat-tab>
          <mat-tab label="Members">
            <div class="flex flex-col p-2">
            </div>
          </mat-tab>
        </mat-tab-group>
      </div>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
