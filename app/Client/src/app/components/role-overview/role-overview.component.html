<div class="h-full flex flex-col select-none">
  <mat-toolbar>
    <div class="flex w-full items-center justify-between min-h-16">
      <h1 *ngIf="selectedRole">Editing {{selectedRole.name}}</h1>
      <h1 *ngIf="!selectedRole">Role Overview</h1>

      <button mat-button type="button" class="flex justify-center items-center" (click)="closeDialog()">
        <div class="flex items-center justify-center">
          <mat-icon>close</mat-icon>
        </div>
      </button>
    </div>
  </mat-toolbar>

  <mat-sidenav-container class="grow">
    <mat-sidenav #sidenav mode="side" opened="true">
      <mat-nav-list>
        <mat-list-item *ngFor="let role of roles" (click)="selectRole(role)">
          <div class="flex items-center justify-content-between">
            <mat-icon *ngIf="role.isDefault" class="scale-75">lock</mat-icon>
            <p>{{role.name}}</p>
          </div>
        </mat-list-item>
      </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content>
      <div *ngIf="!selectedRole" class="flex justify-center items-center h-full">
        <p>Select a role to display settings.</p>
      </div>

      <div *ngIf="selectedRole">
        <mat-tab-group>
          <mat-tab label="Settings">
            <div class="flex flex-col p-2 gap-2">
                <mat-card class="grow">
                  <mat-card-header>
                    <mat-card-title>Display</mat-card-title>
                  </mat-card-header>
                  <mat-card-content>
                    <div class="pt-2">
                      <mat-form-field>
                        <mat-label>Role Name</mat-label>
                        <input matInput>
                      </mat-form-field>
                    </div>
                  </mat-card-content>
                </mat-card>

                <mat-card class="grow">
                  <mat-card-header>
                    <mat-card-title>Permissions</mat-card-title>
                  </mat-card-header>
                  <mat-card-content>
                    <div *ngFor="let permission of permissions">
                      <mat-checkbox>
                        {{ permission.permissionName }}
                      </mat-checkbox>
                    </div>
                  </mat-card-content>
                </mat-card>
            </div>
          </mat-tab>
          <mat-tab label="Members">
            <div class="flex flex-col p-2">
            </div>
          </mat-tab>
        </mat-tab-group>
      </div>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
