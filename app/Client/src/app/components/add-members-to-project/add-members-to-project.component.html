<div id="default-modal" tabindex="-1" aria-hidden="true" class="flex fixed justify-center items-center top-2 left-[25%]">
  <div class="relative p-4 w-full max-w-2xl max-h-full">
    <!-- Modal content -->
    <div class="relative bg-white rounded-lg shadow dark:bg-gray-700 w-[950px]">
      <!-- Modal header -->
      <div class="flex flex-col items-start justify-between p-4 md:p-5 border-b rounded-t dark:border-gray-600">
        <h1 class="text-xl font-bold">Add members to project</h1>
      </div>
      <!-- Modal body -->
      <div class="flex p-2">
        <div class="w-[80%]">
          <div class="flex justify-start">
            <div class="flex flex-col gap-5">
              <div class="w-[90%]">
                <div class="table border-[1px] border-gray-300 rounded-md">
                  <tr class="">
                    <th class="text-left w-10"></th>
                    <th class="text-left p-2 w-40">MEMBER</th>
                    <th class="text-left p-2 w-40">STATUS</th>
                    <th class="text-left p-2 w-40">ROLE</th>
                  </tr>

                  <tr *ngIf="allMembers.length === 0">
                    <td class="p-2 border-t-[1px] border-t-gray-300" colspan="8">No assigned members.</td>
                  </tr>

                  <tr *ngFor="let assignee of allMembers" class="border-[1px] border-gray-500 hover:bg-gray-300">
                    <td *ngIf="isMemberOnProject(assignee.id)" class="w-10 border-t-[1px] border-t-gray-300 p-2"><input type="checkbox" checked (change)="assignRemove($event, assignee.id)"></td>
                    <td *ngIf="isMemberOnProject(assignee.id)" class="w-40 border-t-[1px] border-t-gray-300 p-2">{{assignee.firstName}} {{assignee.lastName}}</td>
                    <td *ngIf="assignee.status != '' && isMemberOnProject(assignee.id)" class="w-40 border-t-[1px] border-t-gray-300 p-2">{{assignee.status}}</td>
                    <td *ngIf="assignee.status === '' && isMemberOnProject(assignee.id)" class="w-40 border-t-[1px] border-t-gray-300 p-2">Not set.</td>
                    <td *ngIf="isMemberOnProject(assignee.id)" class="w-40 border-t-[1px] border-t-gray-300 p-2">{{assignee.roleName}}</td>
                  </tr>

                  <tr *ngFor="let assignee of allMembers" class="border-[1px] border-gray-500 hover:bg-gray-300">
                    <td *ngIf="!isMemberOnProject(assignee.id)" class="w-10 border-t-[1px] border-t-gray-300 p-2"><input type="checkbox" (change)="assignRemove($event, assignee.id)"></td>
                    <td *ngIf="!isMemberOnProject(assignee.id)" class="w-40 border-t-[1px] border-t-gray-300 p-2">{{assignee.firstName}} {{assignee.lastName}}</td>
                    <td *ngIf="assignee.status != '' && !isMemberOnProject(assignee.id)" class="w-40 border-t-[1px] border-t-gray-300 p-2">{{assignee.status}}</td>
                    <td *ngIf="assignee.status === '' && !isMemberOnProject(assignee.id)" class="w-40 border-t-[1px] border-t-gray-300 p-2">Not set.</td>
                    <td *ngIf="!isMemberOnProject(assignee.id)" class="w-40 border-t-[1px] border-t-gray-300 p-2">{{assignee.roleName}}</td>
                  </tr>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>


  <ng-toast></ng-toast>

</div>
