<div class="h-full flex flex-col select-none">
  <mat-toolbar>
    <div class="flex w-full gap-2 items-center min-h-16">
      <h1>Add Project Form</h1>

      <span class="grow"></span>

      <button mat-button type="button" class="flex justify-center items-center" (click)="closeDialog()">
        <div class="flex items-center justify-center">
          <mat-icon>close</mat-icon>
        </div>
      </button>
    </div>
  </mat-toolbar>

  <mat-card>
    <mat-card-content>
      <form [formGroup]="projectForm">
        <div class="flex flex-col gap-2">
          <mat-form-field>
            <mat-label>Choose a name</mat-label>
            <input matInput type="text" placeholder="Ex. Project Management Software" formControlName="projectName" required>
            <mat-error *ngIf="projectForm.get('projectName')?.hasError('required')">
              Project Name is required
            </mat-error>
          </mat-form-field>

          <mat-form-field>
            <mat-label>Priority</mat-label>
            <mat-select formControlName="priorityId" required>
              <mat-option *ngFor="let priority of projectPriorities" [value]="priority.id">{{ priority.name }}</mat-option>
            </mat-select>
            <mat-error *ngIf="projectForm.get('priorityId')?.hasError('required')">
              Priority is required
            </mat-error>
          </mat-form-field>

          <mat-form-field>
            <mat-label>Choose a date</mat-label>
            <input matInput [matDatepicker]="picker" formControlName="deadline">
            <mat-hint>MM/DD/YYYY</mat-hint>
            <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
            <mat-datepicker #picker></mat-datepicker>
          </mat-form-field>

          <mat-form-field>
            <mat-label>Description</mat-label>
            <textarea rows="4" matInput placeholder="Ex. This project is about making something similar to Jira..." formControlName="projectDescription"></textarea>
          </mat-form-field>
        </div>
      </form>
    </mat-card-content>

    <mat-card-actions>
      <div class="flex w-full p-2">
        <span class="grow"></span>
        <button mat-raised-button type="submit" color="primary" (click)="addProject()">Add Project</button>
      </div>
    </mat-card-actions>
  </mat-card>
</div>
