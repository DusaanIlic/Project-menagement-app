<div
  class="flex items-center justify-between p-4 md:p-5 border-b rounded-t dark:border-gray-600"
>
  <h3 class="text-xl font-semibold text-gray-900 dark:text-white">
    Add Project
  </h3>
  <button
    type="button"
    class="text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center dark:hover:bg-gray-600 dark:hover:text-white"
    data-modal-hide="default-modal"
  >
    <svg
      class="w-3 h-3"
      aria-hidden="true"
      xmlns="http://www.w3.org/2000/svg"
      fill="none"
      viewBox="0 0 14 14"
    >
      <path
        stroke="currentColor"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"
      />
    </svg>
    <span class="sr-only">Close modal</span>
  </button>
</div>
<form
  [formGroup]="projectForm"
  (ngSubmit)="onSubmit()"
  class="flex flex-col place-items-center min-h-screen"
>
  <div class="grid grid-rows-2">
    <div class="mt-8 grid lg:grid-cols-2 gap-10">
      <div class="grid grid-rows-2">
        <label for="projectName" class="">Project Name</label>
        <input
          type="text"
          id="projectName"
          formControlName="projectName"
          class="border-2 rounded-md max-h-8"
        />
      </div>

      <div class="grid grid-rows-2">
        <label for="deadLine">Due Date</label>
        <input
          class="border-2 rounded-md max-h-8"
          type="date"
          formControlName="deadLine"
          id="date"
        />
      </div>
    </div>

    <div class="mt-5 grid grid-rows-2">
      <label for="projectDescription">Description</label>
      <textarea
        type="text"
        formControlName="projectDescription"
        id="projectDescription"
        class="border-2 rounded-md"
      >
      </textarea>
      <!-- <div class="NgxEditor__Wrapper">
          <ngx-editor-menu [editor]="editor"> </ngx-editor-menu>
          <ngx-editor
            [editor]="editor"
            [ngModel]="html"
            [disabled]="false"
            [placeholder]="'Type here...'"
          ></ngx-editor>
        </div>-->
    </div>
  </div>

  <button
    type="submit"
    class="mt-20 rounded-xl p-5 bg-accent-blue shadow-md text-white text-xl font-bold"
  >
    Create Project
  </button>

  <div *ngIf="isSuccess; else errorMessage" class="mt-8">
    <label>Projekat je uspešno dodat</label>
  </div>

  <ng-template #errorMessage>
    <div *ngIf="isError" class="mt-8">
      <label>Greška prilikom dodavanja projekta</label>
    </div>
  </ng-template>
</form>
