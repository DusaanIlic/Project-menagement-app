<div class="w-80% mt-5">

    <div class="flex flex-row gap-5 items-center">
        <div class="flex flex-col w-1/6 mb-5">
            <div>
                <p class="text-4xl mb-3">Project 123</p>
            </div>
    
            <div class="flex flex-row gap-5 justify-between">
                <div class="flex flex-col">
                    <p><b>03-February-2024</b></p>
                    <p>Starting date</p>
                </div>
                <div class="flex flex-row items-center">
                    <img src="assets/avatar.png" class="hidden rounded-full border-dashed border-black border-2 xl:w-12 xl:h-12 xl:p-2 xl:table-cell">
                    <p>+20</p>
                </div>
            </div>
        </div>

        <div class="flex flex-row gap-5 ml-10">
            <form>
                <button type="button" class="px-5 py-2 bg-[#0E2954] text-white rounded-xl min-h-12 font-medium hover mr-5">Add Task</button>
                <button type="button" class="px-5 py-2 bg-[#0E2954] text-white rounded-xl min-h-12 font-medium hover">Remove Task</button>
            </form>
        </div>
    </div>


    <div class="flex flex-row gap-20">
        <div class="flex flex-col bg-gray-200 border-1 border-solid border-black rounded-lg w-1/6 p-5">
            <p class="mb-3"><b>To Do</b></p>
           
            <div
                cdkDropList
                #todoList="cdkDropList"
                [cdkDropListData]="todo"
                [cdkDropListConnectedTo]="[doneList]"
                class="border-2 border-solid border-black rounded-md overflow-hidden block bg-white"
                (cdkDropListDropped)="drop($event)">
                @for (item of todo; track item) {
                <div class="px-2.5 py-5 flex flex-row items-center justify-between border-b-2 cursor-move" cdkDrag>{{item}}</div>
                }
            </div>
            
        </div>


        <div class="flex flex-col bg-gray-200 border-1 border-solid border-black rounded-lg w-1/6 p-5">
            <p class="mb-3"><b>In Progress</b></p>
            <div
                cdkDropList
                #doneList="cdkDropList"
                [cdkDropListData]="done"
                [cdkDropListConnectedTo]="[todoList]"
                class="border-2 border-solid border-black rounded-md overflow-hidden block bg-white"
                (cdkDropListDropped)="drop($event)">
                @for (item of done; track item) {
                <div class="px-2.5 py-5 flex flex-row items-center justify-between border-b-2 cursor-move" cdkDrag>{{item}}</div>
                }
            </div>
        </div>

        <div class="flex flex-col bg-gray-200 border-1 border-solid border-black rounded-lg w-1/6 p-5">
            <p class="mb-3"><b>Done</b></p>
            <div class="mb-3">
                <div class="w-60 h-30 rounded-md shadow-2xl flex flex-col pl-5 border-2 border-solid border-black">
                        <p class="text-xl pb-0 pt-3">Task 23</p>
                        <p>Project: Project2</p>
                        <p>Time left: 3 days</p>
                </div>
            </div>

            <div class="mb-3">
                <div class="w-60 h-30 rounded-md shadow-2xl flex flex-col pl-5 border-2 border-solid border-black">
                    <p class="text-xl pb-0 pt-3">Task 23</p>
                    <p>Project: Project2</p>
                    <p>Time left: 3 days</p>
                </div>
            </div>
        </div>
    </div>



</div>
