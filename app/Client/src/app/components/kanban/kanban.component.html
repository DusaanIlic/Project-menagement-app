<div class="mt-5 ml-10 mr-10 p-5 bg-background">

    <div class="flex flex-row gap-5 items-center">
        <div class="flex flex-col w-1/6 mb-5">
            <div>
                <p class="text-4xl mb-3">Project 123</p>
            </div>
    
            <div class="flex flex-row gap-5 justify-between">
                <div class="flex flex-col">
                    <p><b>03-February-2024</b></p>
                    <p>Starting date</p>
                </div>
                <div class="flex flex-row items-center">
                    <img src="assets/avatar.png" class="hidden rounded-full border-dashed border-black border-2 xl:w-12 xl:h-12 xl:p-2 xl:table-cell">
                    <p>+20</p>
                </div>
            </div>
        </div>

        <div class="flex flex-row gap-5 ml-10">
            <form>
                <button type="button" class="px-5 py-2 bg-[#0E2954] text-white rounded-xl min-h-12 font-medium hover mr-5">Add Column</button>
            </form>
        </div>
    </div>


    <div class="w-4/5 flex flex-row gap-20 p-10" cdkDropListGroup>
        <div class="flex flex-col bg-gray-200 border-2 border-solid border-black rounded-lg w-1/6 p-5">
            <div class="flex flex-row justify-between items-center h-10">
                <p class="mb-3 text-lg"><b>To Do</b></p>
                <button type="button" class="px-3 py-2 bg-[#0E2954] text-white rounded-md min-h-3 font-normal hover mb-3">Remove</button>
            </div>

            <div
                cdkDropList
                [cdkDropListData]="todo"
                class="border-2 border-solid border-black rounded-md overflow-hidden block bg-white"
                (cdkDropListDropped)="drop($event)">
                
                <ng-container *ngFor="let item of todo; let i = index">
                    <div class="px-2.5 py-5 flex flex-row items-center justify-between border-b-2 cursor-move" cdkDrag>{{item.taskName}}
                        <button class="hidden w-5 h-5 sm:inline-flex md:inline-flex lg:inline-flex xl:inline-flex"
                        (click)="deleteTask('todo', i)"><img src="assets/icons/delete_36_jpg.jpg"></button>
                    </div>
                </ng-container> 
            </div>
            
        </div>


        <div class="flex flex-col bg-gray-200 border-2 border-solid border-black rounded-lg w-1/6 p-5">
            
            <div class="flex flex-row justify-between items-center h-10">
                <p class="mb-3 text-lg"><b>In Progress</b></p>
                <button type="button" class="px-3 py-2 bg-[#0E2954] text-white rounded-md min-h-3 font-normal hover mb-3">Remove</button>
            </div>

            <div
                cdkDropList
                [cdkDropListData]="progress"
                class="border-2 border-solid border-black rounded-md overflow-hidden block bg-white"
                (cdkDropListDropped)="drop($event)">
                <ng-container *ngFor="let item of progress; let i = index">
                    <div class="px-2.5 py-5 flex flex-row items-center justify-between border-b-2 cursor-move" cdkDrag>{{item.taskName}}
                        <button class="hidden w-5 h-5 sm:inline-flex md:inline-flex lg:inline-flex xl:inline-flex"
                        (click)="deleteTask('progress', i)"><img src="assets/icons/delete_36_jpg.jpg"></button>
                    </div>
                </ng-container> 
            </div>
        </div>

        <div class="flex flex-col bg-gray-200 border-2 border-solid border-black rounded-lg w-1/6 p-5">
            <div class="flex flex-row justify-between items-center h-10">
                <p class="mb-3 text-lg"><b>Completed</b></p>
                <button type="button" class="px-3 py-2 bg-[#0E2954] text-white rounded-md min-h-3 font-normal hover mb-3">Remove</button>
            </div>

            <div
                cdkDropList
                [cdkDropListData]="done"
                class="border-2 border-solid border-black rounded-md overflow-hidden block bg-white"
                (cdkDropListDropped)="drop($event)">
                <ng-container *ngFor="let item of done; let i = index">
                    <div class="px-2.5 py-5 flex flex-row items-center justify-between border-b-2 cursor-move" cdkDrag>{{item.taskName}}
                        <button class="hidden w-5 h-5 sm:inline-flex md:inline-flex lg:inline-flex xl:inline-flex"
                        (click)="deleteTask('done', i)"><img src="assets/icons/delete_36_jpg.jpg"></button>
                    </div>
                </ng-container> 
        </div>
    </div>



</div>
