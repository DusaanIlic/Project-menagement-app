<div class="flex flex-col gap-4 justify-center h-[100%]">
  <div class="flex gap-4 items-center">
    <mat-form-field class="w-96" subscriptSizing="dynamic">
      <mat-label class="select-none">
        <div class="flex items-center justify-between gap-2">
          <p>Search tasks</p>
          <mat-icon class="scale-125">search</mat-icon>
        </div>
      </mat-label>

      <input matInput (keyup)="search($event)">
    </mat-form-field>

    <mat-form-field subscriptSizing="dynamic">
      <mat-label class="select-none">Filter by priority</mat-label>

      <mat-select [value]="selectedPriority" [(ngModel)]="selectedPriority" (ngModelChange)="onStatusChange($event)">
        <mat-option [value]="defaultPrioty">All Priorities</mat-option>
        @for (taskPriority of taskPriorities; track taskPriority.taskPriorityId) {
          <mat-option [value]="taskPriority.taskPriorityId">{{taskPriority.name}}</mat-option>
        }
      </mat-select>
    </mat-form-field>


    <span class="grow"></span>

    <button mat-raised-button color="primary" (click)="scrollToToday()">Scroll to today</button>

    <button mat-raised-button color="primary" (click)="openAddTask()">Add Task</button>
  </div>

  <mat-divider class="w-full"></mat-divider>

  <ngx-gantt #gantt
             [items]="ganttItems"
             [groups]="ganttGroups"
             [viewType]="viewType"
             [draggable]="true"
             [selectable]="true"
             [multiple]="true"
             [linkable]="true"
             (barClick)="barClick($event)"
             (selectedChange)="selectedChange($event)"
             (dragEnded)="dragEnded($event)"
             (linkDragEnded)="linkEnded($event)">

    <ngx-gantt-table>
      <ngx-gantt-column name="Task Name" width="160px" [showExpandIcon]="true" class="select-none">
        <ng-template #cell let-item="item"> {{ item.title }} </ng-template>
      </ngx-gantt-column>

      <ngx-gantt-column name="Start Date" width="120px">
        <ng-template #cell let-item="item">
          {{ item.start * 1000 | date : 'dd-MM-yyyy' }}
        </ng-template>
      </ngx-gantt-column>
      <ngx-gantt-column name="End Date" width="120px">
        <ng-template #cell let-item="item">
          {{ item.end * 1000 | date : 'dd-MM-yyyy' }}
        </ng-template>
      </ngx-gantt-column>
    </ngx-gantt-table>
  </ngx-gantt>
</div>
