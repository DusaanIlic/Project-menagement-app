<div class="flex justify-center h-[100%] shadow">
  <ngx-gantt #gantt [items]="items" class="overflow-x-auto">
    <ngx-gantt-table>
      <ngx-gantt-column name="Tasks" width="300px">
        <ng-template #cell let-item="item"> {{ item.title }} </ng-template>
      </ngx-gantt-column>
    </ngx-gantt-table>
  </ngx-gantt>
</div>
