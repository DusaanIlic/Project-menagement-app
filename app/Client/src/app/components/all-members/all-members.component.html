<div class="flex flex-col mt-5 max-w-80% items-center">
      <div class="flex flex-row ml-2 items-center pb-2 border-b-gray-300 border-b-2 gap-5 w-4/5">

        <mat-form-field class="w-96" subscriptSizing="dynamic">
          <mat-label>
            <div class="flex items-center justify-between gap-2">
              <p>Search</p>
              <mat-icon class="scale-125">search</mat-icon>
            </div>
          </mat-label>

          <input matInput [(ngModel)]="searchTerm" (input)="search()">
        </mat-form-field>

        <span class="grow"></span>

        <button mat-raised-button color="primary" type="button" class="flex items-center justify-center w-48 text-white" (click)="openRoleDialog()">Manage Roles</button>
        <button mat-raised-button color="primary" type="button" class="flex items-center justify-center w-48 text-white" (click)="openMemberDialog()">Add Member</button>
      </div>



      <div class="flex flex-row items-center p-2 w-4/5">
        <h1 class="mr-2">Show only:</h1>
        <mat-radio-group aria-label="Select an option">
          <mat-radio-button id="allMembers" value="allMembers" (click)="onRoleChange($event)" checked color="primary">All Members</mat-radio-button>
          <mat-radio-button id="administrators" value="Administrator" (click)="onRoleChange($event)" color="primary">Administrators</mat-radio-button>
          <mat-radio-button id="projectManagers" value="Project Manager" (click)="onRoleChange($event)" color="primary">Project Manager</mat-radio-button>
          <mat-radio-button id="workers" value="Worker" (click)="onRoleChange($event)" color="primary">Worker</mat-radio-button>
        </mat-radio-group>

      </div>


      <div class="mat-elevation-z8 w-4/5">
        <table mat-table [dataSource]="dataSource" matSort (matSortChange)="announceSortChange($event)">

          <ng-container matColumnDef="avatar">
            <th mat-header-cell *matHeaderCellDef > AVATAR </th>
            <td mat-cell *matCellDef="let member">
              <img ngSrc="{{environment.apiUrl}}/Member/{{member.id}}/Avatar"
              height="30" width="30" alt="user-avatar" (click)="openMemberInfoDialog(member)">
              </td>
          </ng-container>

          <ng-container matColumnDef="firstName">
            <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by firstName">NAME </th>
            <td mat-cell *matCellDef="let member"> {{member.firstName}} {{member.lastName}} </td>
          </ng-container>

          <ng-container matColumnDef="roleName">
            <th mat-header-cell *matHeaderCellDef mat-sort-header mat-sort-header sortActionDescription="Sort by roleName"> ROLE </th>
            <td mat-cell *matCellDef="let member"> {{member.roleName}} </td>
          </ng-container>

          <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by email">EMAIL</th>
            <td mat-cell *matCellDef="let member"> {{member.email}} </td>
          </ng-container>


          <ng-container matColumnDef="tasks">
            <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by tasks">ACTIVE TASKS</th>
            <td mat-cell *matCellDef="let member"> 0 </td>
          </ng-container>


          <ng-container matColumnDef="date">
            <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by date"> DATE OF EMPLOYEMENT  </th>
            <td mat-cell *matCellDef="let member"> {{member.dateAdded | date :'dd-MM-yyyy'}} </td>
          </ng-container>


        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <mat-paginator [pageSizeOptions]="[5, 10, 25]" aria-label="Select page of users"></mat-paginator>
      </div>

    <ng-toast></ng-toast>
</div>
