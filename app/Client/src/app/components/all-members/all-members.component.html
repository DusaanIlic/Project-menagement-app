<div class="flex items-center justify-center">
    <div class="flex items-start flex-col">
        <div class="my-5 flex justify-center gap-5 items-center">
            <input type="text" class="rounded-md border-2 border-black" placeholder="Search..." [(ngModel)]="searchQuery" (keyup)="search()">
            <button type="button" class="flex items-center justify-center w-48 text-white bg-[#0E2954] font-medium rounded-md text-sm px-5 py-2.5 xl:hover:bg-[#0B2043]">New member</button>
        </div>
        
        <div class="flex">
            <table class="table-auto">
                <thead class="text-lg xl:text-2xl h-20">
                    <th class="xl:w-60">Avatar</th>
                    <th class="xl:w-60">Name</th>
                    <th class="xl:w-60 items-center justify-center">Role</th>
                    <th class="hidden sm:table-cell md:table-cell lg:table-cell xl:table-cell xl:w-60">Email</th>
                    <th class="xl:w-60">Date Added</th> 
                </thead>
                <tbody class="text-base xl:text-xl">
                    <tr class="xl:mb-3 border-b-black border-2 xl:h-16 " *ngFor="let member of filteredMembers">
                        <td class="text-center w-20 sm:w-28 md:w-28 lg:w-56 xl:w-60">
                            <div class="flex justify-center">
                                <img src="assets/avatar.png" class="rounded-full border-solid border-black border-2 w-12 h-12 xl:p-2">
                            </div>
                        </td>                        
                        <td class="text-center w-20 sm:w-28 md:w-28 lg:w-56 xl:w-60" [routerLink]="['/members/', member.id]">{{member.firstName}} {{member.lastName}}</td>
                        <td class="text-center w-20 sm:w-28 md:w-28 lg:w-56 xl:w-60" >{{ getRoleName(member.roleId) }}</td>
                        <td class="text-center hidden w-20 sm:w-28 md:w-28 lg:w-56 xl:w-60 sm:table-cell md:table-cell lg:table-cell xl:table-cell" [routerLink]="['/members/', member.id]">{{member.email}}</td>
                        <td class="text-center w-20  hidden  lg:w-56 xl:w-60 lg:table-cell xl:table-cell" [routerLink]="['/members/', member.id]">{{member.dateAdded | date}}</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
