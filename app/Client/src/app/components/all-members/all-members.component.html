<div class="flex ml-2 justify-center">
    <table class="table-fixed">
        <thead class="text-xs xl:text-xl">
            <th class="xl:w-60 xl:text-2xl">Name</th>
            <th class="xl:w-60 xl:text-2xl">Role</th>
            <th class="xl:w-60 xl:text-2xl">Email</th>
            <th class="xl:w-60 xl:text-2xl">Date of employment</th>
            <th class="xl:w-60 xl:text-2xl">Actions</th>
        </thead>
        <tbody>
            <tr>
                <td colspan="5">
                    <button class="rounded-lg border-dashed border-black border-2 w-full xl:text-xl xl:mb-3 xl:mt-3">Add new</button>
                </td>
            </tr>
            <tr *ngFor="let member of members">
                <td class="text-center xl:w-60 xl:text-xl">{{member.name}}</td>
                <td class="text-center xl:w-60 xl:text-xl">{{member.role}}</td>
                <td class="text-center xl:w-60 xl:text-xl">{{member.email}}</td>
                <td class="text-center xl:w-60 xl:text-xl">{{member.phone}}</td>
                <td class="text-center xl:w-60 xl:text-xl">
                    <button >1</button> <button>2</button> <button>3</button>
                </td>
            </tr>
        </tbody>
    </table>
    


</div>
