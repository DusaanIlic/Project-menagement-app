<div class="flex flex-col mt-5">
      <div class="flex flex-row ml-2 items-center border-b-gray-300 border-b-2 pb-2 gap-5">
      

        <input type="text" id="name" aria-label="disabled input 2" class="flex border border-gray-300 text-sm rounded-md p-2.5 w-1/3" value="" placeholder="Search..."  pInputText [(ngModel)]="searchTerm" (input)="search()">

        <span class="grow"></span>

        <button type="button" class="flex items-center justify-center w-48 text-white bg-[#0E2954] font-medium rounded-md text-sm px-5 py-2.5 me-2  xl:hover:bg-[#0B2043]" (click)="openRoleDialog()">Manage Roles</button>
        <button type="button" class="flex items-center justify-center w-48 text-white bg-[#0E2954] font-medium rounded-md text-sm px-5 py-2.5 me-2  xl:hover:bg-[#0B2043]" (click)="openMemberDialog()">Add Member</button>

      </div>

      <div class="flex flex-row items-center p-2">
        <h1 class="mr-2">Show only:</h1>
        <mat-radio-group aria-label="Select an option">
          <mat-radio-button id="allMembers" value="allMembers" (change)="onRoleChange($event)" checked color="primary">All Members</mat-radio-button>
          <mat-radio-button id="administrators" value="Administrator" (change)="onRoleChange($event)" color="primary">Administrators</mat-radio-button>
          <mat-radio-button id="projectManagers" value="Project Manager" (change)="onRoleChange($event)" color="primary">Project Manager</mat-radio-button>
          <mat-radio-button id="workers" value="Worker" (change)="onRoleChange($event)" color="primary">Worker</mat-radio-button>
        </mat-radio-group>
        
        <!--
        <input type="radio" name="projectShow" id="allMembers" value="allMembers" class="mr-2" (change)="onRoleChange($event)" checked>
        <label for="allMembers" class="mr-2">All members</label>

        <input type="radio" name="projectShow" id="administrators" value="Administrator" class="mr-2" (change)="onRoleChange($event)">
        <label for="administrators" class="mr-2">Administrators</label>

        <input type="radio" name="projectShow" id="projectManagers" value="Project Manager" class="mr-2" (change)="onRoleChange($event)">
        <label for="projectManagers" class="mr-2">Project managers</label>

        <input type="radio" name="projectShow" id="workers" value="Worker" class="mr-2" (change)="onRoleChange($event)">
        <label for="workers" class="mr-2">Workers</label>-->
      </div>


      <div class="mat-elevation-z8">
        <table mat-table [dataSource]="dataSource" matSort (matSortChange)="announceSortChange($event)">
          
          <ng-container matColumnDef="avatar">
            <th mat-header-cell *matHeaderCellDef > AVATAR </th>
            <td mat-cell *matCellDef="let member"> <div class="flex justify-center">
              <img ngSrc="{{environment.apiUrl}}/Member/{{member.id}}/Avatar" class="rounded-full border-solid border-black border-2"
              height="35" width="35" alt="user-avatar" (click)="openMemberInfoDialog(member)">
            </div>
               </td>
          </ng-container>
      
          <ng-container matColumnDef="firstName">
            <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by firstName"><div class="flex items-center justify-center">
              NAME
            </div> </th>
            <td mat-cell *matCellDef="let member"> {{member.firstName}} {{member.lastName}} </td>
          </ng-container>
      
          <ng-container matColumnDef="roleName">
            <th mat-header-cell *matHeaderCellDef mat-sort-header mat-sort-header sortActionDescription="Sort by roleName"> ROLE </th>
            <td mat-cell *matCellDef="let member"> {{member.roleName}} </td>
          </ng-container>
      
          <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by email">EMAIL</th>
            <td mat-cell *matCellDef="let member"> {{member.email}} </td>
          </ng-container>

          
          <ng-container matColumnDef="tasks">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>ACTIVE TASKS</th>
            <td mat-cell *matCellDef="let member"> 0 </td>
          </ng-container>

          
          <ng-container matColumnDef="date">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> DATE OF EMPLOYEMENT  </th>
            <td mat-cell *matCellDef="let member"> {{member.dateAdded | date :'dd-MM-yyyy'}} </td>
          </ng-container>
       

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Select page of users"></mat-paginator>
      </div>

    <ng-toast></ng-toast>
</div>
