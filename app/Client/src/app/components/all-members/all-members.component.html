<div class="flex justify-center mt-5">
        <div class="flex w-[90%] justify-center">
            <div class="flex flex-col gap-2">
                <div class="flex flex-row ml-2 items-center border-b-gray-300 border-b-2 pb-2 gap-5">
                    <form>
                        <select id="sort" class="rounded-md bg-gray-50 border border-gray-300 hover:text-gray-600 hover:border-gray-300 dark:hover:text-gray-300 placeholder:text-gray-400" (change)="sortMembersBy($event)">
                        <option disabled selected >Sort by</option>
                        <option value="name">Name</option>
                        <option value="count">Role</option>
                        <option value="email">Email</option>
                        <option value="tasks">Tasks</option>
                        <option value="date">Date</option>
                        </select>
                    </form>

                    <input type="text" id="name" aria-label="disabled input 2" class="flex border border-gray-300 text-sm rounded-md p-2.5 w-50" value="" placeholder="Search..."  pInputText [(ngModel)]="searchTerm" (input)="search()">

                    <span class="grow"></span>

                    <button type="button" class="flex items-center justify-center w-48 text-white bg-[#0E2954] font-medium rounded-md text-sm px-5 py-2.5 me-2  xl:hover:bg-[#0B2043]" (click)="openDialog()">Add Member</button>

                </div>

                <div class="flex flex-row items-center p-2">
                    <h1 class="mr-2">Show only:</h1>
                    <input type="radio" name="projectShow" id="allMembers" value="allMembers" class="mr-2" (change)="onRoleChange($event)" checked>
                    <label for="allMembers" class="mr-2">All members</label>

                    <input type="radio" name="projectShow" id="administrators" value="Administrator" class="mr-2" (change)="onRoleChange($event)">
                    <label for="administrators" class="mr-2">Administrators</label>

                    <input type="radio" name="projectShow" id="projectManagers" value="Project Manager" class="mr-2" (change)="onRoleChange($event)">
                    <label for="projectManagers" class="mr-2">Project managers</label>

                    <input type="radio" name="projectShow" id="workers" value="Worker" class="mr-2" (change)="onRoleChange($event)">
                    <label for="workers" class="mr-2">Workers</label>
                </div>


                <div class="flex justify-center">
                    <div class="table border-[1px] border-gray-300 rounded-md">
                            <tr class="items-center justify-around">
                                <th class="p-3 w-60">AVATAR</th>
                                <th class=" w-60">NAME</th>
                                <th class=" w-60">ROLE</th>
                                <th class=" w-60">EMAIL</th>
                                <th class=" w-60">ACTIVE TASKS</th>
                                <th class=" w-60">DATE OF EMPLOYEMENT</th>
                            </tr>

                            <tr *ngIf="members.length === 0">
                                <td class="p-2 border-t-[1px] border-t-gray-300" colspan="8">No members.</td>
                            </tr>

                            <tr *ngFor="let member of filteredMembers" class="border-[1px] border-gray-500 hover:bg-gray-300 align-middle">
                                <td class="w-60 border-t-[1px] border-t-gray-300">
                                    <div class="flex justify-center">
                                        <img ngSrc="http://localhost:8000/api/Member/{{member.id}}/Avatar" class="rounded-full border-solid border-black border-2"
                                         height="30" width="30" alt="user-avatar" (click)="openMemberInfoDialog(member)">
                                    </div>
                                </td>
                                <td class="text-center w-60 border-t-[1px] border-t-gray-300">{{member.firstName}} {{member.lastName}}</td>
                                <td class="text-center w-60 border-t-[1px] border-t-gray-300">{{ getRoleName(member.roleId) }}</td>
                                <td class="text-center w-60 border-t-[1px] border-t-gray-300">{{member.email}}</td>
                                <td class="text-center w-60 border-t-[1px] border-t-gray-300">{{0}}</td>
                                <td class="text-center w-60 border-t-[1px] border-t-gray-300">{{member.dateAdded | date:'dd-MM-yyyy'}}</td>
                            </tr>
                    </div>
                </div>
        </div>
        <ng-toast></ng-toast>
</div>
