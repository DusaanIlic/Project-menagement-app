<div id="default-modal" tabindex="-1" aria-hidden="true" class="flex overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full">
    <div class="relative p-4 w-full max-w-2xl max-h-full">
        <!-- Modal content -->
        <div class="relative bg-white rounded-lg shadow dark:bg-gray-700">
            <!-- Modal header -->
            <div class="flex flex-col items-start justify-between p-4 md:p-5 border-b rounded-t dark:border-gray-600">
                <h1 class="text-2xl text-gray-900 dark:text-white">
                    {{task.taskName}}
                </h1>
                <h2 class="text-l flex text-gray-900">
                    in <p (click)="closeDialog()" [routerLink]="['/projects/', task.projectId]" class="underline flex ml-2 cursor-pointer">{{task.projectId}}</p>
                </h2>
            </div>
            <!-- Modal body -->
            <div class="p-4 md:p-5 space-y-4">
                <div>
                    <h2 class="text-lg">Description:</h2>
                    <textarea cols="30" rows="3" class="w-full resize-none">{{task.taskDescription}}</textarea>
                </div>
                <div>
                    <h2 class="text-lg">Activity:</h2>
                    <div class="flex flex-col gap-2">
                        <div class="flex flex-row justify-between">
                            <div class="NgxEditor__Wrapper w-[75%] h-36">
                                <ngx-editor-menu [editor]="editor"> </ngx-editor-menu>
                                <ngx-editor [(ngModel)]="html" [editor]="editor" [disabled]="false" [placeholder]="'Type here...'"></ngx-editor>
                            </div>
                            <select class="flex justify-end w-[22%] h-10" name="" id="" [(ngModel)] = "selectedType" (change)="selectChanged()">
                            <option value="1">Update</option>
                            <option value="2">Bug fix</option>
                            <option value="3">Bug</option>
                            </select>
                        </div>
                    <button type="button" class="flex items-center justify-center w-48 text-white bg-[#0E2954] font-medium rounded-md text-sm px-5 py-2.5 xl:hover:bg-[#0B2043]" (click)="saveActivity()">Save activity</button>
                
                    </div>
                    <div class="mt-2 flex flex-col justify-between gap-1">
                        <div class="flex w-full rounded-md items-center px-1" *ngFor="let taskAct of activities">
                            <img src="assets/avatar.png" class="size-10 mr-1 border-2 border-black rounded-full" alt="">
                            <div>
                                <p class="text-lg">{{taskAct.memberName}} wrote "{{taskAct.comment}}"</p>
                                <p *ngIf="lessThanHour" class="text-md">Modified {{differenceM}} minutes ago.</p>
                                <p *ngIf="lessThanDay && !lessThanHour" class="text-md">Modified {{differenceH}} hours ago.</p>
                                <p *ngIf="!lessThanDay && !lessThanHour" class="text-md">{{taskAct.dateModify| date}}</p>
                            </div>
                        </div>

                    </div>



                    </div>
            </div>
            <!-- Modal footer -->
            <div class="flex items-center p-4 md:p-5 border-t border-gray-200 rounded-b dark:border-gray-600">
                <button data-modal-hide="default-modal" type="button" class="flex items-center justify-center w-48 text-white bg-[#0E2954] font-medium rounded-md text-sm px-5 py-2.5 xl:hover:bg-[#0B2043]" (click)="closeDialog()">Close</button>
            </div>
        </div>
    </div>
</div>
