<div class="h-full flex flex-col select-none">
  <mat-toolbar>
    <div class="flex w-full gap-2 items-center justify-between min-h-16">
      <div class="flex flex-col items-start justify-between">
        <h1 class="text-2xl text-gray-900 dark:text-white">
          {{task.taskName}}
        </h1>
        <h2 class="text-lg flex text-gray-900 dark:text-white">
          in <p (click)="closeDialog()" class="underline flex ml-2 cursor-pointer">{{task.projectName}}</p>
        </h2>
      </div>
      <button mat-button type="button" class="flex justify-center items-center" (click)="closeDialog()">
        <div class="flex items-center justify-center">
          <mat-icon>close</mat-icon>
        </div>
      </button>
    </div>
  </mat-toolbar>

  <mat-tab-group>
    <mat-tab label="Overview">
        <div class="flex flex-col gap-5 p-2">
          <div class="flex flex-row justify-between">
            <div class="">
              <mat-card>
                <div class="p-1">
                  <div class="flex flex-row">
                    <mat-card-title>Task name</mat-card-title>
                    <button mat-button (click)="editMode('taskname')"><mat-icon>mode_edit</mat-icon></button>
                  </div>
                  <p *ngIf="!editing">{{task.taskName}}</p>
                  <div *ngIf="editing">
                    <mat-form-field>
                      <mat-label>Task name</mat-label>
                      <input matInput placeholder="Task 1" value="" [(ngModel)]="taskName">
                    </mat-form-field>
                    <button mat-button (click)="changeTaskname()"><mat-icon>done</mat-icon></button>
                  </div>
                </div>
              </mat-card>
            </div>

            <div class="w-[200px]">
              <mat-card>
                <div class="p-1">
                  <div class="flex flex-row">
                    <mat-card-title>Task description</mat-card-title>
                    <button mat-button><mat-icon>mode_edit</mat-icon></button>
                  </div>
                  <p>{{task.taskDescription}}</p>
                </div>
              </mat-card>
            </div>
          </div>

          <div class="flex flex-row justify-between">
            <div>
              <mat-card>
                <div class="p-1">
                  <div class="flex flex-row">
                    <mat-card-title>Start date</mat-card-title>
                  </div>
                  <p>{{task.startDate | date}}</p>
                </div>
              </mat-card>
            </div>

            <div class="w-[200px]">
              <mat-card>
                <div class="p-1">
                  <div class="flex flex-row">
                    <mat-card-title>End date</mat-card-title>
                    <button mat-button><mat-icon>mode_edit</mat-icon></button>
                  </div>
                  <p>{{task.deadline | date}}</p>
                </div>
              </mat-card>
            </div>
          </div>

          <div class="flex flex-row justify-between">
          <div class="w-[200px]">
            <mat-card>
              <div class="p-1">
                <div class="flex flex-row">
                  <mat-card-title>Task status</mat-card-title>
                  <button mat-button><mat-icon>mode_edit</mat-icon></button>
                </div>
                <p>{{task.taskStatus}}</p>
              </div>
            </mat-card>
          </div>


            <div class="w-[200px]">
              <mat-card>
                <div class="p-1">
                  <div class="flex flex-row">
                    <mat-card-title>Task priority</mat-card-title>
                    <button mat-button><mat-icon>mode_edit</mat-icon></button>
                  </div>
                  <p>{{task.taskPriorityName}}</p>
                </div>
              </mat-card>
            </div>
          </div>
        </div>
    </mat-tab>

    <mat-tab label="Assignees">

    </mat-tab>

    <mat-tab label="Dependencies">

    </mat-tab>
  </mat-tab-group>
</div>
