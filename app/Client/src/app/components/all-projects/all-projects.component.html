<div>
  <div class="flex justify-center">
    <div class="mb-4 border-b border-gray-200 dark:border-gray-700">
      <div class="inline-flex justify-start">
        <ul
          class="flex flex-wrap -mb-px text-sm font-medium text-center"
          id="default-tab"
          data-tabs-toggle="#default-tab-content"
          role="tablist"
        >
          <li class="me-2" role="presentation">
            <button
              class="inline-block p-4 border-b-2 rounded-t-lg"
              id="profile-tab"
              data-tabs-target="#profile"
              type="button"
              role="tab"
              aria-controls="profile"
              aria-selected="false"
            >
              Active projects({{ activeProjectsCount }})
            </button>
          </li>
          <li class="me-2" role="presentation">
            <button
              class="inline-block p-4 border-b-2 rounded-t-lg hover:text-gray-600 hover:border-gray-300 dark:hover:text-gray-300"
              id="dashboard-tab"
              data-tabs-target="#dashboard"
              type="button"
              role="tab"
              aria-controls="dashboard"
              aria-selected="false"
            >
              Finished projects({{ finishedProjectsCount }})
            </button>
          </li>
        </ul>
      </div>

      <div class="inline-flex justify-end">
        <ul
          class="flex flex-wrap -mb-px text-sm font-medium text-center"
          id="default-tab"
          data-tabs-toggle="#default-tab-content"
          role="tablist"
        >
          <li>
            <div>
              <div class="">
                <input
                  type="text"
                  id="name"
                  aria-label="disabled input 2"
                  class="flex mb-2 border border-gray-300 text-sm rounded-md p-2.5 w-50"
                  value=""
                  placeholder="Filter by name..."
                />
              </div>
            </div>
          </li>

          <li>
            <div>
              <form>
                <select
                  id="sort"
                  class="rounded-md ml-2 bg-gray-50 border border-gray-300 hover:text-gray-600 hover:border-gray-300 dark:hover:text-gray-300 placeholder:text-gray-400"
                >
                  <option selected>Sort by</option>
                  <option value="name">Name</option>
                  <option value="count">Member count</option>
                  <option value="lead">Project lead</option>
                </select>
              </form>
            </div>
          </li>
        </ul>
      </div>
    </div>
  </div>

  <div class="flex justify-center">
    <div id="default-tab-content">
      <div
        class="hidden p-4 rounded-lg"
        id="profile"
        role="tabpanel"
        aria-labelledby="profile-tab"
      >
        <div class="grid grid-cols-5 gap-5">
          <div
            *ngFor="let activeProj of activeProjects"
            class="w-60 h-60 rounded-md shadow-2xl flex flex-col"
          >
            <div class="h-2/3 rounded-md">
              <img
                src="assets/allProjects/projectImg1.jpg"
                class="rounded-t-md"
              />
            </div>
            <div class="h-1/3 rounded-b-md p-1 pt-0">
              <h2>
                {{ activeProj.name }}
              </h2>
              <p>Project lead: {{ activeProj.lead }}</p>
              <p>Members: 5</p>
            </div>
          </div>
        </div>
      </div>
      <div
        class="hidden p-4 rounded-lg"
        id="dashboard"
        role="tabpanel"
        aria-labelledby="dashboard-tab"
      >
        <div class="grid grid-cols-5 gap-5">
          <div
            *ngFor="let finishedProj of finishedProjects"
            class="w-60 h-60 rounded-md shadow-2xl flex flex-col"
          >
            <div class="h-2/3 rounded-md">
              <img
                src="assets/allProjects/projectImg1.jpg"
                class="rounded-t-md mb-0"
              />
            </div>
            <div class="h-1/3 rounded-b-md p-1 pt-0">
              <h2>
                {{ finishedProj.name }}
              </h2>
              <p>Project lead: {{ finishedProj.lead }}</p>
              <p>Members: 5</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="flex justify-center">
    <div class="flex justify-end">
      <button
        mat-rised-button
        (click)="openDialog()"
        class="flex items-center justify-center w-48 text-white bg-[#0E2954] font-medium rounded-md text-sm px-5 py-2.5 me-2 mb-2 xl:hover:bg-[#0B2043]"
      >
        New project
      </button>
    </div>
  </div>
</div>
