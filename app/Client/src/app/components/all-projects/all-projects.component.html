<div class="flex justify-center">
    <div class="w-9/12">
        <div class="mb-4 border-b border-gray-200 dark:border-gray-700">
            <ul class="flex flex-wrap -mb-px text-sm font-medium text-center" id="default-tab" data-tabs-toggle="#default-tab-content" role="tablist">
                <li class="me-2" role="presentation">
                    <button class="inline-block p-4 border-b-2 rounded-t-lg" id="profile-tab" data-tabs-target="#profile" type="button" role="tab" aria-controls="profile" aria-selected="false">Active projects(6)</button>
                </li>
                <li class="me-2" role="presentation">
                    <button class="inline-block p-4 border-b-2 rounded-t-lg hover:text-gray-600 hover:border-gray-300 dark:hover:text-gray-300" id="dashboard-tab" data-tabs-target="#dashboard" type="button" role="tab" aria-controls="dashboard" aria-selected="false">Finished projects(6)</button>
                </li>
            </ul>
        </div>
        <div id="default-tab-content">
            <div class="hidden p-4 rounded-lg" id="profile" role="tabpanel" aria-labelledby="profile-tab">
                <div class="flex justify-between">
                    <div class="bg-green-400 size-20"></div>
                    <div class="bg-green-400 size-20"></div>
                    <div class="bg-green-400 size-20"></div>
                    <div class="bg-green-400 size-20"></div>
                    <div class="bg-green-400 size-20"></div>
                </div>
            </div>
            <div class="hidden p-4 rounded-lg" id="dashboard" role="tabpanel" aria-labelledby="dashboard-tab">
                <div class="flex justify-between">
                    <div class="bg-red-400 size-20"></div>
                    <div class="bg-red-400 size-20"></div>
                    <div class="bg-red-400 size-20"></div>
                    <div class="bg-red-400 size-20"></div>
                    <div class="bg-red-400 size-20"></div>
                </div>
            </div>
        </div>
    </div>
</div>
