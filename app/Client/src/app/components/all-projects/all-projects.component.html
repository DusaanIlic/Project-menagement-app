<div class="grid m-10 items-center xl:grid-cols-6 gap-10">
    <div class="flex justify-center items-center">
      <div class="flex border-dashed border-black rounded-lg border-2 w-56 h-56 items-center justify-center" routerLink="/projects/add">
          <img class="w-20 h-20 xl:w-36 xl:h-36" src="assets/icons/plusBlue.png" alt="addProject">
      </div>
    </div>

    <div *ngFor="let project of projects" class="flex justify-center items-center" (click)="openDetails()">
        <div class="border-dashed border-black rounded-lg border-2 w-56 h-56">
          <div>
              <img src="assets/allProjects/projectImg.jpg" alt="projectImg.jpg" class="rounded-lg rounded-b-none">
          </div>


          <div class="h-1/3 p-1 pb-0 xl:p-2">
              <div class="flex justify-between">
                  <p>{{project.name}}</p>
                  <p>{{project.status}}</p>
              </div>
              <div>
                  <p>Leader: {{project.lead}}</p>
                  <p>Members: </p>
              </div>
          </div>
        </div>
    </div>
</div>
