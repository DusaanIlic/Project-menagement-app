<div class="flex justify-center">
  <div class="basis-[95%] flex flex-col gap-4 rounded-t-xl">
    <div class="flex flex-col gap-4 select-none">
      <p class="text-accent-blue font-bold text-2xl">All Tasks</p>

      <div class="flex gap-10">
        <div class="flex">
          <mat-form-field class="w-64" subscriptSizing="dynamic">
            <mat-label>
              <div class="flex items-center justify-between gap-2">
                <p>Search Tasks</p>
                <mat-icon class="scale-125">search</mat-icon>
              </div>
            </mat-label>

            <input matInput [(ngModel)]="searchTerm" (input)="search()">
          </mat-form-field>
        </div>

        <span class="grow"></span>

        <div class="flex gap-1">
          <button mat-raised-button color="primary" (click)="openDialog()">Add new task</button>
        </div>
      </div>

      <hr class="border-accent-blue">

      <div class="flex gap-4 text-accent-blue">
        <p class="flex items-center justify-center text-accent-blue font-bold">Show only:</p>

        <mat-radio-group aria-label="Select an option">
          <mat-radio-button id="allTasks" value="allTasks" (click)="onStatusChange($event)" checked color="primary">All Tasks</mat-radio-button>
          <mat-radio-button id="new" value="New" (click)="onStatusChange($event)" color="primary">New</mat-radio-button>
          <mat-radio-button id="inProgress" value="In Progress" (click)="onStatusChange($event)" color="primary">In Progress</mat-radio-button>
          <mat-radio-button id="completed" value="Completed" (click)="onStatusChange($event)" color="primary">Completed</mat-radio-button>
        </mat-radio-group>
      </div>
    </div>

    <hr class="border-accent-blue">

    <div class="mat-elevation-z8 w-4/5 self-center">
      <table mat-table [dataSource]="dataSource" matSort (matSortChange)="announceSortChange($event)">

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by name">TASK </th>
          <td mat-cell *matCellDef="let task"> {{task.taskName}} </td>
        </ng-container>

        <ng-container matColumnDef="startDate">
          <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by startDate"> STARTING DATE  </th>
          <td mat-cell *matCellDef="let task"> {{task.startDate | date :'dd-MM-yyyy'}} </td>
        </ng-container>

        <ng-container matColumnDef="dueDate">
          <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by dueDate"> DUE DATE  </th>
          <td mat-cell *matCellDef="let task"> {{task.deadline | date :'dd-MM-yyyy'}} </td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by status">STATUS</th>
          <td mat-cell *matCellDef="let task"> {{task.taskStatus}} </td>
        </ng-container>

        <ng-container matColumnDef="priority">
          <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by task">PRIORITY</th>
          <td mat-cell *matCellDef="let task"> {{task.taskPriorityName}} </td>
        </ng-container>

        <ng-container matColumnDef="action">
          <th mat-header-cell *matHeaderCellDef> ACTIONS  </th>
          <td mat-cell *matCellDef="let member"> <button mat-flat-button color="warn" >Remove</button> </td>
        </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 25]" aria-label="Select page of users"></mat-paginator>
    </div>
    
  </div>
  <ng-toast></ng-toast>
</div>
