<div class="flex flex-col justify-center">
  <div class="flex flex-col gap-4 rounded-t-xl">
    <div class="flex flex-col gap-4 select-none justify-center">
      <div class="flex gap-10">
        <mat-form-field class="w-96" subscriptSizing="dynamic">
          <mat-label>
            <div class="flex items-center justify-between gap-2">
              <p>Search Tasks</p>
              <mat-icon class="scale-125">search</mat-icon>
            </div>
          </mat-label>

          <input matInput [(ngModel)]="searchTerm" (input)="search()">
        </mat-form-field>

        <span class="grow"></span>

        <div class="flex gap-1 justify-center items-center">
          <button mat-raised-button color="primary" (click)="openDialog()">Add new task</button>
        </div>
      </div>

      <mat-divider class="w-full"></mat-divider>
    </div>

    <div class="mat-elevation-z8 w-full self-center">
      <table mat-table [dataSource]="dataSource" matSort (matSortChange)="announceSortChange($event)">

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by name">TASK </th>
          <td mat-cell *matCellDef="let task"> {{task.taskName}} </td>
        </ng-container>

        <ng-container matColumnDef="startDate">
          <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by startDate"> STARTING DATE  </th>
          <td mat-cell *matCellDef="let task"> {{task.startDate | date :'dd-MM-yyyy'}} </td>
        </ng-container>

        <ng-container matColumnDef="dueDate">
          <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by dueDate"> DUE DATE  </th>
          <td mat-cell *matCellDef="let task"> {{task.deadline | date :'dd-MM-yyyy'}} </td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by status">STATUS</th>
          <td mat-cell *matCellDef="let task"> {{task.taskStatus}} </td>
        </ng-container>

        <ng-container matColumnDef="priority">
          <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by task">PRIORITY</th>
          <td mat-cell *matCellDef="let task"> {{task.taskPriorityName}} </td>
        </ng-container>

        <ng-container matColumnDef="action">
          <th mat-header-cell *matHeaderCellDef> ACTIONS  </th>
          <td mat-cell *matCellDef="let task"> <button mat-flat-button color="warn" (click)="deleteTask(task.taskId)">Remove</button> </td>
        </ng-container>

      <tr class="select-none" mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr class="select-none" mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator class="select-none" [pageSizeOptions]="[5, 10, 25]" aria-label="Select page of users"></mat-paginator>
    </div>

  </div>
  <ng-toast></ng-toast>
</div>
