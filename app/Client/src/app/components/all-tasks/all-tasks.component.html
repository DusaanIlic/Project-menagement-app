<div class="flex justify-center p-8">
  <div class="p-2 basis-3/4 flex flex-col bg-background gap-4 rounded-t-xl">
    <div class="flex flex-col gap-4 select-none">
      <p class="text-accent-blue font-bold text-2xl">All Tasks</p>

      <div class="flex gap-10">
        <div class="flex">
          <input class="rounded-l-xl" type="text" placeholder="Search..">
          <button class="rounded-r-xl bg-accent-blue text-l text-white w-[100px]">Search</button>
        </div>

        <select class="rounded-xl">
          <option selected>Sort by</option>
          <option>Name</option>
          <option>Priority</option>
          <option>Due date</option>
          <option>Progression</option>
        </select>

        <span class="grow"></span>

        <div class="flex gap-1">
          <button class="rounded-xl bg-red-800 text-l text-white w-[120px] disabled:bg-red-400" disabled>Delete task</button>
          <button class="rounded-xl bg-accent-blue text-l text-white w-[120px]">Add new task</button>
        </div>
      </div>

      <hr class="border-accent-blue">

      <div class="flex gap-4">
        <p class="text-accent-blue font-bold">Show only:</p>

        <div class="flex items-center justify-center gap-1">
          <input type="radio" id="radio-all" name="radio-filter">
          <label for="radio-all">All</label>
        </div>

        <div class="flex items-center justify-center gap-1">
          <input type="radio" id="radio-completed" name="radio-filter">
          <label for="radio-completed">Completed Tasks</label>
        </div>

        <div class="flex items-center justify-center gap-1">
          <input type="radio" id="radio-in-progress" name="radio-filter">
          <label for="radio-in-progress">In Progress</label>
        </div>
      </div>
    </div>

    <hr class="border-accent-blue">

    <table class="overflow-auto">
      <thead class="text-left">
        <tr class="text-accent-blue h-12 select-none">
          <th><input type="checkbox" id="checkbox-tasks-all"></th>
          <th>TASK</th>
          <th>STATUS</th>
          <th>ASSIGNEES</th>
          <th>PROGRESS</th>
          <th>DUE DATE</th>
        </tr>
      </thead>

      <tbody>
        <tr class="h-12">
          <td><input type="checkbox" id="checkbox-task-1"></td>
          <td>Upload feeds and reels to instagram</td>
          <td class="flex items-center h-12">
            <p class="bg-blue-800 p-1 rounded-xl text-blue-300 font-bold text-sm select-none">In Progress</p>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
