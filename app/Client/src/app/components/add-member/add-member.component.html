  <div class="pt-10 w-1/2 m-auto flex flex-col justify-center items-center gap-6">
      <div class="w-full flex flex-col sm:flex-row items-center justify-center gap-4">
          <div class="basis-1/2 grow flex flex-col">
              <p class="w-full text-xl">First Name</p>
              <input class="w-full min-h-9 text-xl border-2 rounded-xl p-1.5" name="name" type="text" placeholder=" Name..." [(ngModel)]="firstName">
          </div>

          <div class="basis-1/2 grow flex flex-col">
              <p class="w-full text-xl">Last name</p>
              <input class="w-full min-h-9 text-xl border-2 rounded-xl p-1.5" name="lname" type="text" placeholder=" Last name..." [(ngModel)]="lastName">
          </div>
      </div>

      <div class="w-full flex flex-col sm:flex-row items-center justify-center gap-4">
          <div class="basis-1/2 grow flex flex-col">
              <p class="w-full text-xl">Email</p>
              <input class="w-full min-h-9 text-xl border-2 rounded-xl p-1.5" name="email" type="text" placeholder=" Email..." [(ngModel)]="email">
          </div>

          <div id="phone" class=" basis-1/2 grow flex flex-col">
              <p class="w-full text-xl">Phone number</p>
              <input class="w-full min-h-9 text-xl border-2 rounded-xl p-1.5" name="phone" type="text" placeholder=" Number..." [(ngModel)]="phone">
          </div>
      </div>

      <div class="w-full flex flex-col sm:flex-row items-center justify-center gap-4">
          <div class="basis-1/2 grow flex flex-col">
              <p class="w-full text-xl">Starting role</p>
              <select name="role" class="w-full min-h-9 text-xl border-2 rounded-xl p-1.5" >
                  <option value="">Administrator</option>
                  <option value="">Project manager</option>
                  <option value="">Worker</option>
                  <option value="">Guest</option>
              </select>

           </div>

          <div class="basis-1/2 grow flex flex-col">
              <p class="w-full text-xl">Date of birth</p>
              <input class="w-full min-h-9 text-xl border-2 rounded-xl p-1.5" name="date" type="date" [(ngModel)]="date">
          </div>
      </div>

      <div class="w-full basis-full grow flex flex-col">
          <p class="w-full text-xl">Additional information</p>
          <textarea name="info" class="w-full min-h-24 text-xl border-2 rounded-xl p-1.5" cols="51" rows="5" ></textarea>
      </div>

    <button type="button" class="px-5 py-2 bg-[#0E2954] text-white rounded-2xl min-h-12 font-bold hover" (click)="onClick()">Add staff member</button>
  </div>
