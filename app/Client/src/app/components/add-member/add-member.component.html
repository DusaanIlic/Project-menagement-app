<h1>Add staff member</h1>
<form action="">
    <div id="form">
        <div id="name">
            <p>First Name</p>
            <input name="ime" type="text" placeholder="Name..." [(ngModel)]="name">
        </div>
          
        <div id="lname">
            <p>Last name</p>
            <input type="text" placeholder="Last name...">
        </div>
    
        <div id="email">
            <p>Email</p>
            <input type="text" placeholder="Email...">
        </div>
    
        <div id="phone">
            <p>Phone number</p>
            <input type="text" placeholder="Number...">
        </div>
        <br>
    
       <div id="Role"></div>
              
        <div id="Date">
            <p>Date of birth</p>
            <input type="text" placeholder="Date...">
        </div>
    
        <div id="Info">
            <p>Additional information</p>
            <input type="text" placeholder="Info...">
        </div>
        <br>
    
        <button type="button" (click)="onClick()">Add staff member</button>
    </div>
</form>
