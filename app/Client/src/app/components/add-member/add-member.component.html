<div class="h-full flex flex-col select-none">
  <mat-toolbar>
    <div class="flex w-full gap-2 items-center min-h-16">
      <h1>Add Member Form</h1>

      <span class="grow"></span>

      <button mat-button type="button" class="flex justify-center items-center" (click)="closeDialog()">
        <div class="flex items-center justify-center">
          <mat-icon>close</mat-icon>
        </div>
      </button>
    </div>
  </mat-toolbar>

  <mat-card>
    <mat-card-content>
      <div class="flex flex-col gap-2">
        <mat-form-field>
          <mat-label>First Name</mat-label>
          <input matInput type="text" placeholder="Ex. Pera">
        </mat-form-field>

        <mat-form-field>
          <mat-label>Last Name</mat-label>
          <input matInput type="text" placeholder="Ex. Peric">
        </mat-form-field>

        <mat-form-field>
          <mat-label>Email</mat-label>
          <input matInput type="email" placeholder="Ex. pera.peric@gmail.com">
        </mat-form-field>

        <mat-form-field>
          <mat-label>Role</mat-label>
          <mat-select>
            @for (role of availableRoles; track role) {
              <mat-option [value]="role.id">{{role.name}}</mat-option>
            }
          </mat-select>
        </mat-form-field>
      </div>
    </mat-card-content>

    <mat-card-actions>
      <div class="flex w-full p-2">
        <span class="grow"></span>
        <button mat-raised-button type="submit" color="primary">Add Member</button>
      </div>
    </mat-card-actions>
  </mat-card>
</div>
