<div class="h-full flex flex-col select-none">
    <mat-toolbar>
      <div class="flex w-full gap-2 items-center min-h-16">
        <h1>Add Member Form</h1>
  
        <span class="grow"></span>
  
        <button mat-button type="button" class="flex justify-center items-center" (click)="closeDialog()">
          <div class="flex items-center justify-center">
            <mat-icon>close</mat-icon>
          </div>
        </button>
      </div>
    </mat-toolbar>
    <mat-card>
      <mat-card-content>
        <form [formGroup]="taskForm" (ngSubmit)="saveTask()">
          <div class="flex flex-col gap-2">
            <mat-form-field>
              <mat-label>Task Name</mat-label>
              <input matInput type="text" placeholder="Ex. Figma" formControlName="taskName" required>
              <mat-error *ngIf="taskForm.controls['taskName'].hasError('required')">
                Task Name is required
              </mat-error>
            </mat-form-field>
  
            <mat-form-field>
              <mat-label>Deadline</mat-label>
              <input matInput type="date" placeholder="Select date..." formControlName="deadline" required>
              <mat-error *ngIf="taskForm.controls['deadline'].hasError('required')">
                Deadline is required
              </mat-error>
            </mat-form-field>
  
            <mat-form-field>
              <mat-label>Add Members</mat-label>
              <mat-select formControlName="assignedMembers" required>
                <mat-option *ngFor="let member of projectMembers" [value]="member.id">{{ member.firstName }} {{ member.lastName }}</mat-option>
              </mat-select>
              <mat-error *ngIf="taskForm.controls['assignedMembers'].hasError('required')">
                Members are required
              </mat-error>
            </mat-form-field>

            <mat-form-field>
                <mat-label>Task Description</mat-label>
                <textarea matInput formControlName="taskDescription" placeholder="About this task..." required></textarea>
                <mat-error *ngIf="taskForm.controls['taskDescription'].hasError('required')">
                  Task description is required
                </mat-error>
              </mat-form-field>

          </div>
        </form>
      </mat-card-content>
  
      <mat-card-actions>
        <div class="flex w-full p-2">
          <span class="grow"></span>
          <button mat-raised-button type="submit" color="primary" (click)="saveTask()">Add Task</button>
        </div>
      </mat-card-actions>
    </mat-card>
  </div>
