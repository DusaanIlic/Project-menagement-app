<div class="flex flex-col mt-5 max-w-80% items-center">
  <div class="flex flex-row  mb-2 items-center border-b-gray-300 border-b-[1px] pb-2 gap-5 w-4/5">
    <p class="text-4xl">Assigned Projects</p>

    <span class="grow"></span>

    <mat-form-field class="w-96" subscriptSizing="dynamic">
      <mat-label>
        <div class="flex items-center justify-between gap-2">
          <p>Search Project</p>
          <mat-icon class="scale-125">search</mat-icon>
        </div>
      </mat-label>

      <input matInput>
    </mat-form-field>

    <mat-form-field subscriptSizing="dynamic">
      <mat-label>Filter by status</mat-label>

      <mat-select>
        <mat-option value="allProjects">All Projects</mat-option>
        <mat-option value="activeProjects">Active Projects</mat-option>
        <mat-option value="finishedProjects">Inactive Projects</mat-option>
      </mat-select>
    </mat-form-field>
  </div>

  <div class="mat-elevation-z8 w-4/5">
    <table mat-table [dataSource]="projectSource" matSort (matSortChange)="announceSortChange($event)">

      <ng-container matColumnDef="project">
        <th mat-header-cell *matHeaderCellDef  mat-sort-header sortActionDescription="Sort by project">PROJECT</th>
        <td mat-cell *matCellDef="let project"> {{project.projectName}}</td>
      </ng-container>

      <ng-container matColumnDef="deadline">
        <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by deadline">DUE DATE</th>
        <td mat-cell *matCellDef="let project"> {{project.deadline | date :'dd-MM-yyyy'}} </td>
      </ng-container>

      <ng-container matColumnDef="priority">
        <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by status">PRIORITY</th>
        <td mat-cell *matCellDef="let project"> {{project.status}} </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>ACTIONS</th>
        <td mat-cell *matCellDef="let project">
          <button class="font-extrabold text-3xl" mat-button [matMenuTriggerFor]="menu" (click)="$event.stopPropagation()">...</button>
          <mat-menu #menu="matMenu">
            <button mat-menu-item [routerLink]="['/projects', project.id]">View</button>
          </mat-menu>
        </td>
      </ng-container>

      <tr class="select-none" mat-header-row *matHeaderRowDef="projectColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: projectColumns;"></tr>
    </table>

    <mat-paginator class="select-none" [pageSizeOptions]="[5, 10, 25]" aria-label="Select page of users"></mat-paginator>
  </div>
</div>
